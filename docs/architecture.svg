  <text x="450" y="551" text-anchor="middle" font-size="13" font-weight="600" fill="#7F6000">Google Cloud Services</text>

  <!-- Row 1 (y=562, h=62) -->
  <rect x="60"  y="562" width="146" height="62" rx="5" fill="#FFFDE7" stroke="#F9D49B" stroke-width="1"/>
  <text x="133" y="582" text-anchor="middle" font-size="11" font-weight="600" fill="#5F4000">Vertex AI</text>
  <text x="133" y="596" text-anchor="middle" font-size="9"  fill="#7F6000">Gemini 2.5 Flash</text>
  <text x="133" y="610" text-anchor="middle" font-size="9"  fill="#7F6000">LLM for all agents</text>

  <rect x="218" y="562" width="146" height="62" rx="5" fill="#FFFDE7" stroke="#F9D49B" stroke-width="1"/>
  <text x="291" y="582" text-anchor="middle" font-size="11" font-weight="600" fill="#5F4000">Vertex AI Search</text>
  <text x="291" y="596" text-anchor="middle" font-size="9"  fill="#7F6000">ECI documents</text>
  <text x="291" y="610" text-anchor="middle" font-size="9"  fill="#7F6000">grounded RAG</text>

  <rect x="376" y="562" width="146" height="62" rx="5" fill="#FFFDE7" stroke="#F9D49B" stroke-width="1"/>
  <text x="449" y="582" text-anchor="middle" font-size="11" font-weight="600" fill="#5F4000">Maps Platform</text>
  <text x="449" y="596" text-anchor="middle" font-size="9"  fill="#7F6000">Places · Directions</text>
  <text x="449" y="610" text-anchor="middle" font-size="9"  fill="#7F6000">booth map rendering</text>

  <rect x="534" y="562" width="146" height="62" rx="5" fill="#FFFDE7" stroke="#F9D49B" stroke-width="1"/>
  <text x="607" y="582" text-anchor="middle" font-size="11" font-weight="600" fill="#5F4000">Firestore</text>
  <text x="607" y="596" text-anchor="middle" font-size="9"  fill="#7F6000">session state</text>
  <text x="607" y="610" text-anchor="middle" font-size="9"  fill="#7F6000">constituency data</text>

  <rect x="692" y="562" width="146" height="62" rx="5" fill="#FFFDE7" stroke="#F9D49B" stroke-width="1"/>
  <text x="765" y="582" text-anchor="middle" font-size="11" font-weight="600" fill="#5F4000">BigQuery</text>
  <text x="765" y="596" text-anchor="middle" font-size="9"  fill="#7F6000">election history</text>
  <text x="765" y="610" text-anchor="middle" font-size="9"  fill="#7F6000">2004&#8211;2024 results</text>

  <!-- Row 2 (y=636, h=62) -->
  <rect x="60"  y="636" width="146" height="62" rx="5" fill="#FFFDE7" stroke="#F9D49B" stroke-width="1"/>
  <text x="133" y="656" text-anchor="middle" font-size="11" font-weight="600" fill="#5F4000">Cloud Translation</text>
  <text x="133" y="670" text-anchor="middle" font-size="9"  fill="#7F6000">EN / HI / TA / BN</text>
  <text x="133" y="684" text-anchor="middle" font-size="9"  fill="#7F6000">input + response</text>

  <rect x="218" y="636" width="146" height="62" rx="5" fill="#FFFDE7" stroke="#F9D49B" stroke-width="1"/>
  <text x="291" y="656" text-anchor="middle" font-size="11" font-weight="600" fill="#5F4000">Cloud Text-to-Speech</text>
  <text x="291" y="670" text-anchor="middle" font-size="9"  fill="#7F6000">Hindi audio</text>
  <text x="291" y="684" text-anchor="middle" font-size="9"  fill="#7F6000">Neural2 voice</text>

  <rect x="376" y="636" width="146" height="62" rx="5" fill="#FFFDE7" stroke="#F9D49B" stroke-width="1"/>
  <text x="449" y="656" text-anchor="middle" font-size="11" font-weight="600" fill="#5F4000">Cloud Logging</text>
  <text x="449" y="670" text-anchor="middle" font-size="9"  fill="#7F6000">structured JSON</text>
  <text x="449" y="684" text-anchor="middle" font-size="9"  fill="#7F6000">request tracing</text>

  <rect x="534" y="636" width="146" height="62" rx="5" fill="#FFFDE7" stroke="#F9D49B" stroke-width="1"/>
  <text x="607" y="656" text-anchor="middle" font-size="11" font-weight="600" fill="#5F4000">Secret Manager</text>
  <text x="607" y="670" text-anchor="middle" font-size="9"  fill="#7F6000">API keys</text>
  <text x="607" y="684" text-anchor="middle" font-size="9"  fill="#7F6000">credentials</text>

  <rect x="692" y="636" width="146" height="62" rx="5" fill="#FFFDE7" stroke="#F9D49B" stroke-width="1"/>
  <text x="765" y="656" text-anchor="middle" font-size="11" font-weight="600" fill="#5F4000">Google ADK</text>
  <text x="765" y="670" text-anchor="middle" font-size="9"  fill="#7F6000">agent framework</text>
  <text x="765" y="684" text-anchor="middle" font-size="9"  fill="#7F6000">orchestration</text>

</svg>
