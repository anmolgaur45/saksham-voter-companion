steps:
  # --- Backend ---
  - name: "gcr.io/cloud-builders/docker"
    id: build-backend
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/saksham/backend:$COMMIT_SHA
      - apps/backend

  - name: "gcr.io/cloud-builders/docker"
    id: push-backend
    args:
      - push
      - asia-south1-docker.pkg.dev/$PROJECT_ID/saksham/backend:$COMMIT_SHA
    waitFor: [build-backend]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-backend
    entrypoint: gcloud
    args:
      - run
      - deploy
      - saksham-backend
      - --image=asia-south1-docker.pkg.dev/$PROJECT_ID/saksham/backend:$COMMIT_SHA
      - --region=asia-south1
      - --no-allow-unauthenticated
      - --service-account=saksham-runtime@$PROJECT_ID.iam.gserviceaccount.com
      - --set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,GCP_REGION=asia-south1,VERTEX_LOCATION=us-central1,VERTEX_MODEL=gemini-2.5-flash,VERTEX_SEARCH_DATASTORE_ID=$_VERTEX_SEARCH_DATASTORE_ID,FIRESTORE_DATABASE=$_FIRESTORE_DATABASE
    waitFor: [push-backend]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: get-backend-url
    entrypoint: bash
    args:
      - -c
      - >-
        gcloud run services describe saksham-backend
        --region=asia-south1
        --format='value(status.url)'
        > /workspace/backend_url
    waitFor: [deploy-backend]

  # --- Web ---
  - name: "gcr.io/cloud-builders/docker"
    id: build-web
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/saksham/web:$COMMIT_SHA
      - --build-arg=NEXT_PUBLIC_MAPS_API_KEY=$_MAPS_API_KEY
      - apps/web
    waitFor: [get-backend-url]

  - name: "gcr.io/cloud-builders/docker"
    id: push-web
    args:
      - push
      - asia-south1-docker.pkg.dev/$PROJECT_ID/saksham/web:$COMMIT_SHA
    waitFor: [build-web]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-web
    entrypoint: bash
    args:
      - -c
      - |
        BACKEND_URL=$(cat /workspace/backend_url)
        gcloud run deploy saksham-web \
          --image=asia-south1-docker.pkg.dev/$PROJECT_ID/saksham/web:$COMMIT_SHA \
          --region=asia-south1 \
          --allow-unauthenticated \
          --service-account=saksham-runtime@$PROJECT_ID.iam.gserviceaccount.com \
          --set-env-vars="GCP_PROJECT_ID=$PROJECT_ID,BACKEND_URL=$$BACKEND_URL"
    waitFor: [push-web]

substitutions:
  _MAPS_API_KEY: ""
  _VERTEX_SEARCH_DATASTORE_ID: ""
  _FIRESTORE_DATABASE: "saksham-voter-companion"

images:
  - asia-south1-docker.pkg.dev/$PROJECT_ID/saksham/backend:$COMMIT_SHA
  - asia-south1-docker.pkg.dev/$PROJECT_ID/saksham/web:$COMMIT_SHA
